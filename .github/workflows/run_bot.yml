name: Silom POS Auto Download Hourly

on:
  schedule:
    # 23 = 06:00 น. | 5 = 12:00 น. | 13 = 20:00 น. (ตามเวลาไทย)
    - cron: '0 23,5,13 * * *'
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install selenium

    - name: Run Silom POS Bot
      run: python silom_download.py

    - name: Move File to Stock Data Folder
      run: |
        mkdir -p stock_data
        ls -la /home/runner/Downloads
        mv /home/runner/Downloads/*.xlsx stock_data/SKU.xlsx

    - name: Commit and Push to GitHub
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add stock_data/SKU.xlsx
        git diff --quiet && git diff --staged --quiet || (git commit -m "Hourly Auto-update stock data: SKU.xlsx" && git push)

    # 🛠️ เพิ่มใหม่: สั่งให้ส่งรูปภาพหน้าจอออกมาแสดงให้เราเปิดดู ไม่ว่าจะรันผ่านหรือล้มเหลวก็ตาม
    - name: Upload Screenshots for Debugging
      if: always() # สั่งให้รันขั้นตอนนี้เสมอแม้บอทจะเออเร่อ
      uses: actions/upload-artifact@v4
      with:
        name: bot-screenshots
        path: /home/runner/work_screenshots/
