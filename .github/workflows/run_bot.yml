name: Silom POS Auto Download Hourly

on:
  schedule:
    # 23 = 06:00 น. | 5 = 12:00 น. | 13 = 20:00 น. (ตามเวลาไทย)
    - cron: '0 23,5,13 * * *'
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # ดึงประวัติ Commit ทั้งหมดมาด้วยเพื่อป้องกันปัญหาตอน Push

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium pandas openpyxl

    - name: Run Silom POS Bot
      run: python silom_download.py

    - name: Commit and Push to GitHub
      run: |
        git config --global user.name "actions-user"
        git config --global user.email "actions@github.com"
        
        # 🌟 บังคับกวาดทุกไฟล์รวมถึงไฟล์ JSON รายเดือนตัวใหม่เข้าคิวทั้งหมด
        git add -A
        
        # 🌟 บังคับ Commit เสมอ ถ้าไม่มีอะไรเปลี่ยนจริง ๆ ให้ปล่อยผ่านไม่แจ้งพัง
        git commit -m "Hourly Auto-update stock data and logs (New month setup / Stock updates)" || echo "No changes to commit"
        
        # 🌟 ยิง Force Push สวนขึ้นไปทันทีเพื่อตัดปัญหาโดนปฏิเสธ (Rejected) และอัปเดตไฟล์ขึ้นหน้าเว็บชัวร์ ๆ
        git push -f origin main

    # 🛠️ ส่งรูปภาพหน้าจอออกมาแสดงให้เราเปิดดู ไม่ว่าจะรันผ่านหรือล้มเหลวก็ตาม
    - name: Upload Screenshots for Debugging
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-screenshots
        path: /home/runner/work_screenshots/