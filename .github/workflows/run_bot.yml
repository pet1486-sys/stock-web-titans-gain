name: Silom POS Auto Download Hourly

on:
  schedule:
    # 23 = 06:00 น. | 5 = 12:00 น. | 13 = 20:00 น. (ตามเวลาไทย)
    - cron: '0 23,5,13 * * *'
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # ดึงประวัติ Commit ทั้งหมดมาด้วยเพื่อป้องกันปัญหาตอน Push

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium pandas openpyxl  # 🌟 เพิ่มโมดูลสำหรับจัดการ Excel เรียบร้อยแล้ว

    - name: Run Silom POS Bot
      run: python silom_download.py

    - name: Commit and Push to GitHub
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # ดึงไฟล์ใน stock_data ทั้งหมดเข้าคิว
        git add stock_data/
        
        # 🌟 เช็คว่ามีไฟล์ JSON รายเดือนตัวใหม่ที่ยังไม่เคยมีอยู่บน GitHub โผล่มาไหม หรือ สต็อกมีการเปลี่ยนแปลง
        if git status --porcelain | grep -E "stock_data/logs_.*\.json|SKU.xlsx"; then
          git commit -m "Hourly Auto-update stock data and logs (New month setup / Stock updates)"
          git pull origin main --rebase
          git push origin main
        else
          echo "ไม่มีไฟล์รายงานใหม่ และไม่มีการเปลี่ยนแปลงในสต็อก ไม่ต้อง Commit"
        fi

    # 🛠️ ส่งรูปภาพหน้าจอออกมาแสดงให้เราเปิดดู ไม่ว่าจะรันผ่านหรือล้มเหลวก็ตาม
    - name: Upload Screenshots for Debugging
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-screenshots
        path: /home/runner/work_screenshots/