name: Silom POS Auto Download Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install selenium

    - name: Run Silom POS Bot
      run: python silom_download.py

    - name: Move File to Stock Data Folder
      run: |
        mkdir -p stock_data
        
        # แสดงรายชื่อไฟล์ในโฟลเดอร์ดาวน์โหลดเพื่อตรวจสอบ
        ls -la /home/runner/Downloads
        
        # ย้ายไฟล์ Excel ไปที่โฟลเดอร์ stock_data
        mv /home/runner/Downloads/*.xlsx stock_data/SKU.xlsx

    - name: Commit and Push to GitHub
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add stock_data/SKU.xlsx
        git diff --quiet && git diff --staged --quiet || (git commit -m "Hourly Auto-update stock data: SKU.xlsx" && git push)